<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Alliance–War Network Model — Algorithms</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  html,body { height:100%; margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
  #app { height:100vh; width:100vw; position:relative; overflow:hidden; background:#071827; }

  /* Full-page network canvas */
  svg#network {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    background: linear-gradient(180deg,#071021 0%, #071827 60%, #0b2230 100%);
  }

  /* Controls overlay */
  .controls {
    position: absolute;
    left: 12px;
    top: 12px;
    width: 360px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    padding: 12px;
    border-radius: 8px;
    backdrop-filter: blur(6px);
    box-shadow: 0 6px 18px rgba(2,6,23,0.6);
    font-size: 13px;
  }
  .controls h3 { margin:0 0 8px 0; font-size:15px; }
  .controls label { display:block; margin-top:8px; color:#cfe8ff; }
  .controls .row { display:flex; align-items:center; gap:8px; margin-top:6px; }
  .controls input[type="range"] { width:100%; }
  .controls button { margin-top:10px; padding:6px 10px; border-radius:6px; border:0; cursor:pointer; background:#1f6feb; color:white; }
  .controls .small { font-size:12px; color:#bcd7ff; }

  .alg-buttons { display:flex; gap:8px; margin-top:8px; }
  .alg-buttons button { flex:1; padding:6px; border-radius:6px; border:0; cursor:pointer; background:#334155; color:#e6eefc; }
  .alg-buttons button.active { background:#06b6d4; color:#021426; font-weight:700; }

  /* Stats panel bottom-left */
  .stats {
    position:absolute;
    left:12px;
    bottom:12px;
    width:520px;
    height:160px;
    background: rgba(255,255,255,0.04);
    color:#fff;
    padding:10px;
    border-radius:8px;
    box-shadow: 0 6px 18px rgba(2,6,23,0.6);
    font-size:12px;
  }
  .stats svg { width:100%; height:100%; display:block; }

  /* Tooltip */
  .tooltip {
    position:absolute;
    pointer-events:none;
    background:rgba(0,0,0,0.75);
    color:#fff;
    padding:6px 8px;
    border-radius:6px;
    font-size:12px;
    transform:translate(-50%,-120%);
    white-space:nowrap;
  }

  .legend { margin-top:8px; display:flex; gap:8px; align-items:center; }
  .legend .sw { width:18px; height:12px; border-radius:3px; display:inline-block; }
</style>
</head>
<body>
<div id="app">
  <svg id="network"></svg>

  <div class="controls" id="controls">
    <h3>Alliance–War Model</h3>

    <label>N (number of states): <span id="Nval" class="small">40</span></label>
    <input id="Nslider" type="range" min="5" max="300" value="40">

    <label>Timescale ratio r (alliances per war) — log scale (0.01 → 100): <span id="Rval" class="small">10</span></label>
    <!-- slider is log10(r) from -2 (0.01) to 2 (100) -->
    <input id="Rslider" type="range" min="-2" max="2" step="0.01" value="1">

    <label>Simulation speed (ms per step): <span id="SpeedVal" class="small">100</span></label>
    <input id="SpeedSlider" type="range" min="10" max="1000" step="10" value="100">

    <div style="margin-top:8px">
      <div class="small" style="color:#cfe8ff">Choose algorithm (affects how second node is selected):</div>
      <div class="alg-buttons">
        <button id="algRandom" class="active">Random</button>
        <button id="algPref">Preferential</button>
        <button id="algWeak">Target Weak</button>
      </div>
    </div>

    <div class="row">
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn" style="background:#ef4444">Reset</button>
      <div style="flex:1" class="small">t: <span id="timeDisplay">0</span></div>
    </div>

    <div class="legend small">
      <div style="color:#cfe8ff">Node color = degree (darker = higher)</div>
    </div>
  </div>

  <div class="stats" id="statsPanel">
    <div style="font-size:13px; color:#cfe8ff; margin-bottom:6px">Mean connectivity (average degree)</div>
    <svg id="stats"></svg>
  </div>

  <div id="tooltip" class="tooltip" style="display:none"></div>
</div>

<script>
/* ---------------------------
   Parameters and state
   --------------------------- */
let N = 40;
let ratio = 10;          // alliances per war (can be fractional)
let stepMs = 100;
let running = true;
let t = 0;

let nodes = [];
let adjacency = []; // NxN boolean
let links = [];     // {source: nodeObj, target: nodeObj}

let meanConnectivityHistory = [];
const maxHistory = 500;

/* algorithm mode: 'random' | 'pref' | 'weak' */
let mode = 'random';

/* ---------------------------
   D3 setup
   --------------------------- */
const svg = d3.select("#network");
let width = window.innerWidth;
let height = window.innerHeight;
svg.attr("viewBox", [0,0,width,height]);

const linkGroup = svg.append("g").attr("class","links");
const nodeGroup = svg.append("g").attr("class","nodes");

const colorScale = d3.scaleSequential(d3.interpolateViridis);

const simulation = d3.forceSimulation()
  .force("charge", d3.forceManyBody().strength(-120))
  .force("link", d3.forceLink().id(d => d._id).distance(60).strength(0.9))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collide", d3.forceCollide(12));

let linkSel = linkGroup.selectAll("line");
let nodeSel = nodeGroup.selectAll("circle");

/* Tooltip */
const tooltip = d3.select("#tooltip");

/* ---------------------------
   UI elements
   --------------------------- */
const Nslider = document.getElementById("Nslider");
const Rslider = document.getElementById("Rslider");
const SpeedSlider = document.getElementById("SpeedSlider");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");
const Nval = document.getElementById("Nval");
const Rval = document.getElementById("Rval");
const SpeedVal = document.getElementById("SpeedVal");
const timeDisplay = document.getElementById("timeDisplay");

const algRandom = document.getElementById("algRandom");
const algPref = document.getElementById("algPref");
const algWeak = document.getElementById("algWeak");

Nslider.value = N;
Rslider.value = Math.log10(ratio);
SpeedSlider.value = stepMs;
Nval.textContent = N;
Rval.textContent = ratio.toFixed(2);
SpeedVal.textContent = stepMs;

/* ---------------------------
   Helpers
   --------------------------- */
function makeEmptyAdj(n) {
  return Array.from({length:n}, () => Array.from({length:n}, () => false));
}

function rebuildLinksFromAdj() {
  links = [];
  for (let i=0;i<nodes.length;i++){
    for (let j=i+1;j<nodes.length;j++){
      if (adjacency[i][j]) {
        links.push({ source: nodes[i], target: nodes[j] });
      }
    }
  }
}

/* ---------------------------
   Reset / Resize / Node ops
   --------------------------- */
function resetSimulation() {
  N = +Nslider.value;
  ratio = Math.pow(10, +Rslider.value);
  stepMs = +SpeedSlider.value;
  Nval.textContent = N;
  Rval.textContent = ratio.toFixed(2);
  SpeedVal.textContent = stepMs;

  nodes = d3.range(N).map(i => ({ _id: i }));
  adjacency = makeEmptyAdj(N);
  links = [];
  meanConnectivityHistory = [];
  t = 0;
  timeDisplay.textContent = t;
  updateGraph();
  restartTimer();
}

function addNodes(k) {
  for (let m=0;m<k;m++){
    const newId = nodes.length;
    nodes.push({ _id: newId });
    // expand adjacency
    adjacency.forEach(row => row.push(false));
    adjacency.push(Array.from({length:nodes.length}, () => false));
  }
}

function removeRandomNode() {
  if (nodes.length <= 5) return;
  const idx = Math.floor(Math.random() * nodes.length);
  // remove node and its adjacency row/col
  nodes.splice(idx,1);
  adjacency.splice(idx,1);
  adjacency.forEach(row => row.splice(idx,1));
  // reassign _id to keep 0..n-1
  nodes.forEach((d,i) => d._id = i);
}

/* ---------------------------
   Sampling helpers (choose partner based on weights)
   --------------------------- */
function sampleIndexByWeights(weights, excludeIdx = -1) {
  // weights: array of non-negative numbers
  // excludeIdx: index to exclude (set weight to 0)
  const n = weights.length;
  let total = 0;
  for (let i=0;i<n;i++){
    if (i === excludeIdx) continue;
    total += weights[i];
  }
  if (total <= 0) {
    // fallback: uniform random among allowed indices
    const candidates = [];
    for (let i=0;i<n;i++) if (i !== excludeIdx) candidates.push(i);
    if (candidates.length === 0) return -1;
    return candidates[Math.floor(Math.random() * candidates.length)];
  }
  let r = Math.random() * total;
  for (let i=0;i<n;i++){
    if (i === excludeIdx) continue;
    r -= weights[i];
    if (r <= 0) return i;
  }
  // numerical fallback
  for (let i=n-1;i>=0;i--) if (i !== excludeIdx && weights[i] > 0) return i;
  return -1;
}

/* compute degrees array */
function computeDegreesArray() {
  const deg = new Array(nodes.length).fill(0);
  for (let i=0;i<nodes.length;i++){
    for (let j=i+1;j<nodes.length;j++){
      if (adjacency[i][j]) { deg[i]++; deg[j]++; }
    }
  }
  return deg;
}

/* ---------------------------
   Dynamics: alliance & war (with algorithm modes)
   --------------------------- */

/* choose partner for alliances or wars:
   - random: pick a random other node
   - pref: pick partner with probability proportional to degree (prefer high-degree)
   - weak: pick partner with probability proportional to 1/(degree+1) (prefer low-degree)
*/
function choosePartnerFor(nodeIdx, mode, excludeAllied = false, requireNonAllied = false) {
  if (nodes.length < 2) return -1;
  const deg = computeDegreesArray();
  const n = nodes.length;

  // build weights
  const weights = new Array(n).fill(0);
  for (let j=0;j<n;j++){
    if (j === nodeIdx) continue;
    if (excludeAllied && adjacency[nodeIdx][j]) continue;
    if (requireNonAllied && adjacency[nodeIdx][j]) continue;
    if (mode === 'random') {
      weights[j] = 1;
    } else if (mode === 'pref') {
      // preferential: weight proportional to degree (plus small epsilon)
      weights[j] = deg[j] + 0.01;
    } else if (mode === 'weak') {
      // target weak: prefer low-degree opponents
      weights[j] = 1 / (deg[j] + 1);
    } else {
      weights[j] = 1;
    }
  }

  // if requireNonAllied is true, ensure we only pick non-allied partners
  // if excludeAllied true, same effect
  const idx = sampleIndexByWeights(weights, nodeIdx);
  return idx;
}

/* Alliance formation: choose leader randomly, choose partner according to mode,
   but ensure we pick a non-edge (if chosen partner is already allied, try again).
*/
function makeAlliance() {
  if (nodes.length < 2) return;
  let tries = 0;
  while (tries < 200) {
    const leader = Math.floor(Math.random() * nodes.length);
    const partner = choosePartnerFor(leader, mode, false, true); // require non-allied
    if (partner === -1) { tries++; continue; }
    if (leader !== partner && !adjacency[leader][partner]) {
      adjacency[leader][partner] = adjacency[partner][leader] = true;
      return;
    }
    tries++;
  }
}

/* War event: choose leader randomly, choose opponent according to mode,
   ensure they are not allied (war only between non-allied).
   Winner chosen randomly; loser loses all alliances and becomes allied with winner.
*/
function warEvent() {
  if (nodes.length < 2) return;
  let tries = 0;
  while (tries < 200) {
    const leader = Math.floor(Math.random() * nodes.length);
    const opponent = choosePartnerFor(leader, mode, false, true); // require non-allied
    if (opponent === -1) { tries++; continue; }
    const a = leader, b = opponent;
    if (a !== b && !adjacency[a][b]) {
      const winner = Math.random() < 0.5 ? a : b;
      const loser = winner === a ? b : a;

      // remove all alliances of loser
      for (let i=0;i<nodes.length;i++){
        if (adjacency[loser][i]) {
          adjacency[loser][i] = adjacency[i][loser] = false;
        }
      }

      // loser becomes allied with winner
      adjacency[winner][loser] = adjacency[loser][winner] = true;
      return;
    }
    tries++;
  }
}

/* Perform alliance steps for possibly fractional ratio:
   do floor(ratio) steps, plus one extra with probability fractional part */
function performAllianceSteps(r) {
  const k = Math.floor(r);
  for (let i=0;i<k;i++) makeAlliance();
  const frac = r - k;
  if (Math.random() < frac) makeAlliance();
}

/* ---------------------------
   Statistics
   --------------------------- */
function computeMeanConnectivityDegrees() {
  let totalEdges = 0;
  const degrees = new Array(nodes.length).fill(0);
  for (let i=0;i<nodes.length;i++){
    for (let j=i+1;j<nodes.length;j++){
      if (adjacency[i][j]) {
        totalEdges++;
        degrees[i]++; degrees[j]++;
      }
    }
  }
  // average degree (mean connectivity) = sum(degrees)/N = 2*edges/N
  const meanDegree = nodes.length > 0 ? (2 * totalEdges) / nodes.length : 0;
  meanConnectivityHistory.push(meanDegree);
  if (meanConnectivityHistory.length > maxHistory) meanConnectivityHistory.shift();
  return { degrees, meanDegree };
}

/* ---------------------------
   Graph update (rebuild links, update D3 selections)
   --------------------------- */
function updateGraph(degreesObj = null) {
  // rebuild links from adjacency
  rebuildLinksFromAdj();

  // compute degrees if not provided
  let degrees;
  if (!degreesObj) {
    degrees = computeDegreesArray();
  } else {
    degrees = degreesObj.degrees || computeDegreesArray();
  }

  // update color domain based on max degree
  const maxDeg = Math.max(1, d3.max(degrees));
  colorScale.domain([0, Math.max(6, maxDeg)]);

  // join links
  linkSel = linkGroup.selectAll("line")
    .data(links, d => `${d.source._id}-${d.target._id}`);

  linkSel.exit().remove();

  const linkEnter = linkSel.enter().append("line")
    .attr("stroke", "rgba(200,220,255,0.25)")
    .attr("stroke-width", 1.2);

  linkSel = linkEnter.merge(linkSel);

  // join nodes
  nodeSel = nodeGroup.selectAll("circle")
    .data(nodes, d => d._id);

  nodeSel.exit().remove();

  const nodeEnter = nodeSel.enter().append("circle")
    .attr("r", 7)
    .attr("stroke", "#021426")
    .attr("stroke-width", 1.2)
    .call(drag(simulation))
    .on("mouseover", (event,d) => {
      const idx = d._id;
      // compute degree directly from adjacency matrix (robust)
      const deg = adjacency[idx].reduce((acc, v) => acc + (v ? 1 : 0), 0);
      tooltip.style("display","block")
        .html(`id: ${d._id} &nbsp; | &nbsp; degree: ${deg}`);
    })
    .on("mousemove", (event) => {
      tooltip.style("left", (event.clientX) + "px")
             .style("top", (event.clientY) + "px");
    })
    .on("mouseout", () => tooltip.style("display","none"));

  nodeSel = nodeEnter.merge(nodeSel);

  // set node colors based on degree
  nodeSel.attr("fill", d => {
    const idx = d._id;
    const deg = degrees[idx] || 0;
    return colorScale(deg);
  });

  // restart simulation with updated nodes/links
  simulation.nodes(nodes);
  simulation.force("link").links(links);
  simulation.alpha(0.9).restart();

  simulation.on("tick", () => {
    linkSel
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);

    nodeSel
      .attr("cx", d => d.x = Math.max(8, Math.min(width-8, d.x)))
      .attr("cy", d => d.y = Math.max(8, Math.min(height-8, d.y)));
  });
}

/* D3 drag */
function drag(sim) {
  function started(event,d) {
    if (!event.active) sim.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }
  function dragged(event,d) {
    d.fx = event.x;
    d.fy = event.y;
  }
  function ended(event,d) {
    if (!event.active) sim.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }
  return d3.drag().on("start", started).on("drag", dragged).on("end", ended);
}

/* ---------------------------
   Stats plot (mean connectivity)
   --------------------------- */
const statsSvg = d3.select("#stats");
const statsW = 520;
const statsH = 140;
statsSvg.attr("viewBox", [0,0,statsW,statsH]);

function updateStatsPlot() {
  statsSvg.selectAll("*").remove();
  const margin = {left:36, right:8, top:8, bottom:24};
  const w = statsW - margin.left - margin.right;
  const h = statsH - margin.top - margin.bottom;

  const x = d3.scaleLinear()
    .domain([0, Math.max(10, meanConnectivityHistory.length)])
    .range([0, w]);

  const y = d3.scaleLinear()
    .domain([0, d3.max(meanConnectivityHistory.concat([1]))])
    .range([h, 0]);

  const g = statsSvg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  // axes
  g.append("g").attr("transform", `translate(0,${h})`)
    .call(d3.axisBottom(x).ticks(5).tickFormat(d => d));
  g.append("g")
    .call(d3.axisLeft(y).ticks(4));

  // line
  const line = d3.line()
    .x((d,i) => x(i))
    .y(d => y(d))
    .curve(d3.curveMonotoneX);

  g.append("path")
    .datum(meanConnectivityHistory)
    .attr("fill","none")
    .attr("stroke","#7dd3fc")
    .attr("stroke-width",2)
    .attr("d", line);

  // last value text
  const last = meanConnectivityHistory.length ? meanConnectivityHistory[meanConnectivityHistory.length-1] : 0;
  statsSvg.append("text")
    .attr("x", statsW - 8)
    .attr("y", 14)
    .attr("text-anchor","end")
    .attr("fill","#cfe8ff")
    .attr("font-size",12)
    .text(`mean degree: ${last.toFixed(2)}`);
}

/* ---------------------------
   Main stepping loop (controlled by timer)
   --------------------------- */
let timerId = null;

function stepOnce() {
  // alliance steps (possibly fractional)
  performAllianceSteps(ratio);
  // war step
  warEvent();

  // compute stats and update graph/colors
  const degreesObj = computeMeanConnectivityDegrees();
  updateGraph(degreesObj);
  updateStatsPlot();

  t++;
  timeDisplay.textContent = t;
}

function startTimer() {
  if (timerId) clearInterval(timerId);
  timerId = setInterval(() => {
    if (running) stepOnce();
  }, stepMs);
}

function restartTimer() {
  if (timerId) clearInterval(timerId);
  if (running) {
    timerId = setInterval(() => {
      if (running) stepOnce();
    }, stepMs);
  }
}

/* ---------------------------
   UI interactions (real-time)
   --------------------------- */
Nslider.addEventListener("input", (e) => {
  const newN = +e.target.value;
  Nval.textContent = newN;
  if (newN > nodes.length) {
    addNodes(newN - nodes.length);
  } else if (newN < nodes.length) {
    // remove random nodes until match
    while (nodes.length > newN) removeRandomNode();
  }
  updateGraph();
});

Rslider.addEventListener("input", (e) => {
  ratio = Math.pow(10, +e.target.value);
  Rval.textContent = ratio.toFixed(2);
});

SpeedSlider.addEventListener("input", (e) => {
  stepMs = +e.target.value;
  SpeedVal.textContent = stepMs;
  restartTimer();
});

pauseBtn.addEventListener("click", () => {
  running = !running;
  pauseBtn.textContent = running ? "Pause" : "Resume";
  if (running) restartTimer();
  else if (timerId) clearInterval(timerId);
});

resetBtn.addEventListener("click", () => {
  resetSimulation();
});

/* Algorithm buttons */
function setMode(m) {
  mode = m;
  algRandom.classList.toggle('active', m === 'random');
  algPref.classList.toggle('active', m === 'pref');
  algWeak.classList.toggle('active', m === 'weak');
}
algRandom.addEventListener('click', () => setMode('random'));
algPref.addEventListener('click', () => setMode('pref'));
algWeak.addEventListener('click', () => setMode('weak'));

/* ---------------------------
   Window resize handling
   --------------------------- */
window.addEventListener("resize", () => {
  width = window.innerWidth; height = window.innerHeight;
  svg.attr("viewBox", [0,0,width,height]);
  simulation.force("center", d3.forceCenter(width/2, height/2));
});

/* ---------------------------
   Start
   --------------------------- */
resetSimulation();
startTimer();

</script>
</body>
</html>
